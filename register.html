<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Mini SIEM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #020b17; font-family: 'Courier New', monospace; color: #00ffc3;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 30px 0;
}
.container {
    width: 440px; background: #061726; padding: 45px 40px;
    border-radius: 12px; border: 1px solid #00ffc3;
    box-shadow: 0 0 30px rgba(0,255,195,0.1);
}
.logo { text-align: center; font-size: 0.8rem; color: rgba(0,255,195,0.5); margin-bottom: 5px; }
h2   { text-align: center; margin-bottom: 30px; font-size: 1.5rem; }
.input-group { margin-bottom: 18px; position: relative; }
label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: rgba(0,255,195,0.8); }
input {
    width: 100%; padding: 11px 15px; background: #020b17;
    border: 1px solid rgba(0,255,195,0.4); color: #00ffc3;
    border-radius: 6px; font-family: monospace; font-size: 0.95rem; transition: border 0.2s;
}
input:focus { outline: none; border-color: #00ffc3; box-shadow: 0 0 8px rgba(0,255,195,0.2); }
.toggle-eye {
    position: absolute; right: 12px; top: 37px;
    cursor: pointer; user-select: none; font-size: 0.85rem; color: rgba(0,255,195,0.6);
}
.hint { font-size: 0.78rem; margin-top: 4px; opacity: 0.6; }
.hint.ok   { color: #00ffc3; opacity: 1; }
.hint.warn { color: #ffa500; opacity: 1; }
.hint.err  { color: #ff6464; opacity: 1; }
button {
    width: 100%; padding: 13px; background: #00ffc3; border: none;
    color: #020b17; font-weight: bold; border-radius: 6px; cursor: pointer;
    font-family: monospace; font-size: 1rem; transition: background 0.2s; margin-top: 5px;
}
button:hover { background: #00e0aa; }
.message {
    padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;
    background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.4); color: #ff6464;
}
.links { text-align: center; margin-top: 20px; font-size: 0.85rem; }
.links a { color: #00ffc3; text-decoration: none; }
.links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <div class="logo">[ MINI SIEM SECURITY SYSTEM ]</div>
    <h2>Create Account</h2>

    {% if message %}
    <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" id="username" placeholder="Choose a username"
                   onkeyup="checkUsername()" required>
            <div class="hint" id="usermsg"></div>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@email.com" required>
            <div class="hint">Max 3 accounts per email</div>
        </div>

        <div class="input-group">
            <label>Phone Number <span style="color:rgba(0,255,195,0.4);font-size:0.75rem;">(optional)</span></label>
            <input type="tel" name="phone" placeholder="10-digit phone number"
                   pattern="[0-9]{10}" title="Enter 10-digit phone number">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" id="password"
                   placeholder="Min 8 chars, upper, lower, number, symbol"
                   onkeyup="checkStrength(); checkMatch();" required>
            <span class="toggle-eye" onclick="toggleField('password', this)">show</span>
            <div class="hint" id="strength"></div>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password"
                   placeholder="Repeat password" onkeyup="checkMatch()" required>
            <span class="toggle-eye" onclick="toggleField('confirm_password', this)">show</span>
            <div class="hint" id="matchmsg"></div>
        </div>

        <div class="input-group">
            <label>PIN (4-6 digits)</label>
            <input type="password" name="pin" id="pin"
                   placeholder="4 to 6 digit numeric PIN" maxlength="6"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>
            <span class="toggle-eye" onclick="toggleField('pin', this)">show</span>
        </div>

        <button type="submit">Create Account &rarr;</button>
    </form>

    <div class="links">
        <a href="/login">Already have an account? Login</a>
        &nbsp;|&nbsp;
        <a href="/">Home</a>
    </div>
</div>

<script>
function toggleField(id, el) {
    const f = document.getElementById(id);
    f.type = f.type === 'password' ? 'text' : 'password';
    el.textContent = f.type === 'password' ? 'show' : 'hide';
}

function checkUsername() {
    const val = document.getElementById('username').value;
    const msg = document.getElementById('usermsg');
    if (val.length < 3) { msg.textContent = ''; return; }
    fetch('/check_username?username=' + encodeURIComponent(val))
        .then(r => r.text())
        .then(t => {
            msg.textContent = t;
            msg.className = 'hint ' + (t.includes('available') ? 'ok' : 'err');
        });
}

function checkStrength() {
    const p  = document.getElementById('password').value;
    const el = document.getElementById('strength');
    const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(p);
    if (p.length < 8) {
        el.textContent = 'Weak - too short'; el.className = 'hint err';
    } else if (strong) {
        el.textContent = 'Strong password'; el.className = 'hint ok';
    } else {
        el.textContent = 'Medium - add symbols, numbers, mixed case'; el.className = 'hint warn';
    }
}

function checkMatch() {
    const p  = document.getElementById('password').value;
    const c  = document.getElementById('confirm_password').value;
    const el = document.getElementById('matchmsg');
    if (!c) { el.textContent = ''; return; }
    if (p === c) {
        el.textContent = 'Passwords match'; el.className = 'hint ok';
    } else {
        el.textContent = 'Passwords do not match'; el.className = 'hint err';
    }
}
</script>
</body>
</html>
